<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart - YummyTo</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="cart.css">

</head>


<body>


<header>

<div id="backdiv">

<div class="brand">

<img src="images/logo.jpg" class="logo">

<div>

<h1 id="title">YummyTo</h1>

<p>"Where Flavor Meets Passion"</p>

</div>

</div>


<nav class="nav">

<a href="index.html">Home</a>
<a href="restaurants.html">Restaurants</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
<a href="cart.html" class="cart-link active">🛒 Cart <span id="cart-count" class="cart-count"></span></a>
</nav>

</div>
</header>


<main>

<section id="cart-section">

<h2 class="section-title">Shopping Cart</h2>

<div id="cart-container" class="cart-container">

<div id="empty-cart" class="empty-cart">
<p>Your cart is empty</p>
<a href="index.html" class="back-btn">Continue Shopping</a>
</div>

<table id="cart-table" class="cart-table" style="display:none;">
<tr>
<th>Item</th>
<th>Restaurant</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>
<tbody id="cart-items"></tbody>
</table>

</div>

<div id="cart-summary" class="cart-summary" style="display:none;">
<div class="summary-box">
<h3>Order Summary</h3>
<div class="summary-row">
<span>Subtotal:</span>
<span id="subtotal">₹0</span>
</div>
<div class="summary-row">
<span>Delivery:</span>
<span id="delivery">₹50</span>
</div>
<div class="summary-row total">
<span>Total:</span>
<span id="total">₹0</span>
</div>
<button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
<a href="index.html" class="continue-shopping-btn">Continue Shopping</a>
</div>
</div>

</section>

</main>


<footer>

<p>
© 2026 YummyTo. All Rights Reserved.
</p>

</footer>


<script src="cart.js"></script>


</body>

</html>
